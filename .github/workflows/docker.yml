name: Publish Docker image

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version tag (e.g. 1.11.2-upstream-ce3a3b0)'
        required: false
        default: ''

concurrency:
  group: docker-publish
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        shell: bash
        run: |
          SHA12="${GITHUB_SHA::12}"
          echo "SHA12=${SHA12}" >> "$GITHUB_ENV"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=upstream-${SHA12}" >> "$GITHUB_ENV"
          fi
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/camofox-browser" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:upstream-${{ env.SHA12 }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
